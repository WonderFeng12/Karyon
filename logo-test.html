<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111921;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .test-container {
            background-color: #111921;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }
        .test-logo {
            width: 40px;
            height: 40px;
            background-color: transparent;
        }
        .test-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: transparent;
            border: none;
            outline: none;
        }
        h1 {
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Logo Transparency Test</h1>
        <div class="test-logo">
            <img src="image/logo.png" alt="Logo Test">
        </div>
        <p style="color: white; margin-top: 20px;">If the logo has a transparent background, you should see the dark background (#111921) through it.</p>
    </div>
</body>
</html>
